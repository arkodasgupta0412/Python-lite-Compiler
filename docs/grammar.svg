<svg xmlns="http://www.w3.org/2000/svg" width="736" height="680" viewBox="0 0 736 680">
  <rect x="0" y="0" width="100%" height="100%" fill="#f8fafc"/>
  <text x="10" y="28" font-family="Consolas, monospace" font-size="18" font-weight="700" fill="#0f172a">Grammar Rules (Raw CFG, Start=Program)</text>
  <rect x="10" y="44" width="120" height="28" fill="#dbeafe" stroke="#94a3b8"/>
  <text x="20" y="62" font-family="Consolas, monospace" font-size="13" font-weight="700" fill="#0f172a">Non-Terminal</text>
  <rect x="130" y="44" width="596" height="28" fill="#dbeafe" stroke="#94a3b8"/>
  <text x="140" y="62" font-family="Consolas, monospace" font-size="13" font-weight="700" fill="#0f172a">Production</text>
  <rect x="10" y="72" width="120" height="28" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="20" y="90" font-family="Consolas, monospace" font-size="13" fill="#1e293b">AssignOp</text>
  <rect x="130" y="72" width="596" height="28" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="140" y="90" font-family="Consolas, monospace" font-size="13" fill="#1e293b">= | += | -=</text>
  <rect x="10" y="100" width="120" height="28" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="20" y="118" font-family="Consolas, monospace" font-size="13" fill="#1e293b">AssignStmt</text>
  <rect x="130" y="100" width="596" height="28" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="140" y="118" font-family="Consolas, monospace" font-size="13" fill="#1e293b">IDENT AssignOp Expr</text>
  <rect x="10" y="128" width="120" height="28" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="20" y="146" font-family="Consolas, monospace" font-size="13" fill="#1e293b">ElementsOpt</text>
  <rect x="130" y="128" width="596" height="28" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="140" y="146" font-family="Consolas, monospace" font-size="13" fill="#1e293b">Expr MoreElements | ε</text>
  <rect x="10" y="156" width="120" height="28" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="20" y="174" font-family="Consolas, monospace" font-size="13" fill="#1e293b">ElseOpt</text>
  <rect x="130" y="156" width="596" height="28" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="140" y="174" font-family="Consolas, monospace" font-size="13" fill="#1e293b">else : \n &lt;INDENT&gt; StmtList &lt;DEDENT&gt; | ε</text>
  <rect x="10" y="184" width="120" height="28" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="20" y="202" font-family="Consolas, monospace" font-size="13" fill="#1e293b">Expr</text>
  <rect x="130" y="184" width="596" height="28" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="140" y="202" font-family="Consolas, monospace" font-size="13" fill="#1e293b">Expr + Term | Expr - Term | Term</text>
  <rect x="10" y="212" width="120" height="28" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="20" y="230" font-family="Consolas, monospace" font-size="13" fill="#1e293b">Factor</text>
  <rect x="130" y="212" width="596" height="28" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="140" y="230" font-family="Consolas, monospace" font-size="13" fill="#1e293b">- Factor | Primary</text>
  <rect x="10" y="240" width="120" height="28" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="20" y="258" font-family="Consolas, monospace" font-size="13" fill="#1e293b">ForBody</text>
  <rect x="130" y="240" width="596" height="28" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="140" y="258" font-family="Consolas, monospace" font-size="13" fill="#1e293b">Stmt | \n &lt;INDENT&gt; StmtList &lt;DEDENT&gt;</text>
  <rect x="10" y="268" width="120" height="28" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="20" y="286" font-family="Consolas, monospace" font-size="13" fill="#1e293b">ForStmt</text>
  <rect x="130" y="268" width="596" height="28" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="140" y="286" font-family="Consolas, monospace" font-size="13" fill="#1e293b">for IDENT in Expr : ForBody</text>
  <rect x="10" y="296" width="120" height="28" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="20" y="314" font-family="Consolas, monospace" font-size="13" fill="#1e293b">IfStmt</text>
  <rect x="130" y="296" width="596" height="28" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="140" y="314" font-family="Consolas, monospace" font-size="13" fill="#1e293b">if Expr : \n &lt;INDENT&gt; StmtList &lt;DEDENT&gt; ElseOpt</text>
  <rect x="10" y="324" width="120" height="28" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="20" y="342" font-family="Consolas, monospace" font-size="13" fill="#1e293b">ListLiteral</text>
  <rect x="130" y="324" width="596" height="28" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="140" y="342" font-family="Consolas, monospace" font-size="13" fill="#1e293b">[ ElementsOpt ]</text>
  <rect x="10" y="352" width="120" height="28" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="20" y="370" font-family="Consolas, monospace" font-size="13" fill="#1e293b">MoreElements</text>
  <rect x="130" y="352" width="596" height="28" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="140" y="370" font-family="Consolas, monospace" font-size="13" fill="#1e293b">, Expr MoreElements | ε</text>
  <rect x="10" y="380" width="120" height="28" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="20" y="398" font-family="Consolas, monospace" font-size="13" fill="#1e293b">Primary</text>
  <rect x="130" y="380" width="596" height="28" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="140" y="398" font-family="Consolas, monospace" font-size="13" fill="#1e293b">INT | FLOAT | STRING | BOOL | IDENT | RangeCall | ( Expr ) | ListLiteral</text>
  <rect x="10" y="408" width="120" height="28" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="20" y="426" font-family="Consolas, monospace" font-size="13" fill="#1e293b">PrintStmt</text>
  <rect x="130" y="408" width="596" height="28" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="140" y="426" font-family="Consolas, monospace" font-size="13" fill="#1e293b">print ( Expr )</text>
  <rect x="10" y="436" width="120" height="28" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="20" y="454" font-family="Consolas, monospace" font-size="13" fill="#1e293b">Program</text>
  <rect x="130" y="436" width="596" height="28" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="140" y="454" font-family="Consolas, monospace" font-size="13" fill="#1e293b">StmtList $</text>
  <rect x="10" y="464" width="120" height="28" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="20" y="482" font-family="Consolas, monospace" font-size="13" fill="#1e293b">RangeCall</text>
  <rect x="130" y="464" width="596" height="28" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="140" y="482" font-family="Consolas, monospace" font-size="13" fill="#1e293b">range ( Expr , Expr RangeStepOpt )</text>
  <rect x="10" y="492" width="120" height="28" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="20" y="510" font-family="Consolas, monospace" font-size="13" fill="#1e293b">RangeStepOpt</text>
  <rect x="130" y="492" width="596" height="28" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="140" y="510" font-family="Consolas, monospace" font-size="13" fill="#1e293b">, Expr | ε</text>
  <rect x="10" y="520" width="120" height="28" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="20" y="538" font-family="Consolas, monospace" font-size="13" fill="#1e293b">SEP</text>
  <rect x="130" y="520" width="596" height="28" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="140" y="538" font-family="Consolas, monospace" font-size="13" fill="#1e293b">\n | ;</text>
  <rect x="10" y="548" width="120" height="28" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="20" y="566" font-family="Consolas, monospace" font-size="13" fill="#1e293b">Stmt</text>
  <rect x="130" y="548" width="596" height="28" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="140" y="566" font-family="Consolas, monospace" font-size="13" fill="#1e293b">AssignStmt | PrintStmt | ForStmt | IfStmt</text>
  <rect x="10" y="576" width="120" height="28" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="20" y="594" font-family="Consolas, monospace" font-size="13" fill="#1e293b">StmtList</text>
  <rect x="130" y="576" width="596" height="28" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="140" y="594" font-family="Consolas, monospace" font-size="13" fill="#1e293b">StmtTail</text>
  <rect x="10" y="604" width="120" height="28" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="20" y="622" font-family="Consolas, monospace" font-size="13" fill="#1e293b">StmtTail</text>
  <rect x="130" y="604" width="596" height="28" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="140" y="622" font-family="Consolas, monospace" font-size="13" fill="#1e293b">SEP StmtTail | Stmt StmtTail | ε</text>
  <rect x="10" y="632" width="120" height="28" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="20" y="650" font-family="Consolas, monospace" font-size="13" fill="#1e293b">Term</text>
  <rect x="130" y="632" width="596" height="28" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="140" y="650" font-family="Consolas, monospace" font-size="13" fill="#1e293b">Term * Factor | Term / Factor | Factor</text>
</svg>
